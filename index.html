<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>総代会 出席管理システム</title>
  <meta name="theme-color" content="#1B365D"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#EDF2F7;font-family:'Noto Sans JP',sans-serif;}
    #root{width:100%;max-width:768px;margin:0 auto;min-height:100vh;}
    input,select,button{font-family:inherit;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
    @media(min-width:640px){.modal-inner{max-width:560px !important;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useReducer,useEffect,useCallback,useMemo,useRef,createContext,useContext}=React;

/* ── CONFIG ── */
const GAS_URL="https://script.google.com/macros/s/AKfycbzANpXVUDpMN5CAuAa7Hihxk_uP4-VkbElKz91Ok3PJgFFnQlI9ViLGo0y9m6m-jMZNOg/exec";
const IS_DEMO=GAS_URL==="YOUR_GAS_URL_HERE";
const POLL_MS=10000;
const QUORUM=0.5;
const S={NONE:"未入力",PRESENT:"出席",PROXY:"代理出席",BALLOT:"書面議決",ABSENT:"欠席"};
const T={navy:"#1B365D",nd:"#0d1f36",nl:"#2a518f",gold:"#C5A55A",bg:"#EDF2F7",ok:"#16a34a",ng:"#dc2626",warn:"#d97706",teal:"#0d9488"};
const SCFG={
  [S.NONE]:   {bg:"#e5e7eb",fg:"#9ca3af",dot:"#d1d5db"},
  [S.PRESENT]:{bg:T.ok,     fg:"#fff",   dot:T.ok},
  [S.PROXY]:  {bg:T.nl,     fg:"#fff",   dot:T.nl},
  [S.BALLOT]: {bg:T.gold,   fg:"#fff",   dot:T.gold},
  [S.ABSENT]: {bg:"#9ca3af",fg:"#fff",   dot:"#9ca3af"},
};

/* ── DEMO DATA ── */
const _BR=[{d:"彦根支店",a:"彦根センター管内"},{d:"長浜支店",a:"彦根センター管内"},{d:"草津支店",a:"草津センター管内"},{d:"大津支店",a:"草津センター管内"},{d:"甲賀支店",a:"甲賀センター管内"}];
const _N=[["鈴木一郎","スズキ イチロウ"],["田中義雄","タナカ ヨシオ"],["渡辺幸子","ワタナベ サチコ"],["山本健一","ヤマモト ケンイチ"],["伊藤美智子","イトウ ミチコ"],["中村正夫","ナカムラ マサオ"],["小林和子","コバヤシ カズコ"],["加藤達也","カトウ タツヤ"],["吉田悦子","ヨシダ エツコ"],["松本浩司","マツモト コウジ"]];
const DEMO_MEMBERS=Array.from({length:30},(_,i)=>({id:`M${String(i+1).padStart(3,"0")}`,name:_N[i%10][0],nameKana:_N[i%10][1],district:_BR[i%5].d,area:_BR[i%5].a}));
const _AN=[["佐々木花子","ササキ ハナコ"],["高橋一郎","タカハシ イチロウ"],["山田幸子","ヤマダ サチコ"],["小川健二","オガワ ケンジ"],["木村美穂","キムラ ミホ"]];
const DEMO_ASSOC=Array.from({length:10},(_,i)=>({id:`A${String(i+1).padStart(3,"0")}`,name:_AN[i%5][0],nameKana:_AN[i%5][1],district:_BR[i%3].d,area:_BR[i%3].a}));
const DEMO_USERS=[{id:"u1",name:"彦根支店",icon:"🌸"},{id:"u2",name:"長浜支店",icon:"🏔️"},{id:"u3",name:"事務局",icon:"🎋"}];
const DEMO_AGENDAS=[{id:"A1",title:"第1号議案：令和5年度事業報告承認の件",type:"普通決議"},{id:"A2",title:"第2号議案：令和5年度決算承認の件",type:"普通決議"},{id:"A3",title:"第3号議案：役員選任の件",type:"特別決議"}];

/* ── CSV ── */
function parseCsv(text){
  const lines=text.trim().split(/\r?\n/).filter(Boolean);
  if(!lines.length)return[];
  const clean=l=>l.replace(/^\uFEFF/,"");
  const first=clean(lines[0]).split(",")[0].trim().replace(/^"|"$/g,"");
  const data=(isNaN(first)&&!/^[MA]\d+/i.test(first))?lines.slice(1):lines;
  return data.map((line,idx)=>{
    const c=clean(line).split(",").map(x=>x.trim().replace(/^"|"$/g,""));
    return{id:c[0]||`M${String(idx+1).padStart(3,"0")}`,name:c[1]||"",nameKana:c[2]||"",district:c[3]||"",area:c[4]||"",tel:c[5]||""};
  }).filter(m=>m.name);
}

/* ── API ── */
const api={
  async req(action,method="GET",body=null){
    const opts={method,redirect:"follow"};
    if(body){opts.headers={"Content-Type":"text/plain;charset=utf-8"};opts.body=JSON.stringify(body);}
    const res=await fetch(`${GAS_URL}?action=${action}`,opts);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    try{return JSON.parse(text);}catch{throw new Error("JSON解析失敗:"+text.slice(0,80));}
  },
  getAll:            ()  =>api.req("getAll"),
  updateStatus:      d   =>api.req("updateStatus","POST",d),
  updateAssocStatus: d   =>api.req("updateAssocStatus","POST",d),
  importMembers:     arr =>api.req("importMembers","POST",{members:arr}),
  importAssocMembers:arr =>api.req("importAssocMembers","POST",{members:arr}),
};

/* ── REDUCER ── */
const INIT={user:null,screen:"login",members:[],statuses:{},assocMembers:[],assocStatuses:{},agendas:[],users:[],loading:false,syncing:false,toast:null};
function reducer(s,{type:t,p}){
  switch(t){
    case "USER":    return{...s,user:p,screen:p?"loading":"login"};
    case "SCREEN":  return{...s,screen:p};
    case "MEMBERS": return{...s,members:p,screen:"dash"};
    case "ASSOC_MEMBERS":return{...s,assocMembers:p};
    case "SYNC":{
      const goTo=s.screen==="loading"?(p.members?.length>0?"dash":"csv"):s.screen;
      return{...s,...p,syncing:false,loading:false,screen:goTo};
    }
    case "LOAD":    return{...s,loading:p};
    case "SYNCING": return{...s,syncing:p};
    case "TOAST":   return{...s,toast:p};
    case "STATUS":{
      const next={...s.statuses};
      if(p.status===S.NONE)delete next[p.memberId];else next[p.memberId]=p.status;
      return{...s,statuses:next};
    }
    case "ASSOC_STATUS":{
      const next={...s.assocStatuses};
      if(p.status===S.NONE)delete next[p.memberId];else next[p.memberId]=p.status;
      return{...s,assocStatuses:next};
    }
    default:return s;
  }
}

/* ── CONTEXT & HOOKS ── */
const Ctx=createContext();
const useApp=()=>useContext(Ctx);

function useRole(){
  const{state}=useApp();
  return useMemo(()=>{
    const userName=state.user?.name||"";
    const dOf=m=>m.district||m.branch||"";
    const allD=[...new Set(state.members.map(dOf).filter(Boolean))];
    const isAdmin=!userName||!allD.includes(userName);
    const myBranch=isAdmin?"":userName;
    const visibleMembers=isAdmin?state.members:state.members.filter(m=>dOf(m)===userName);
    const visibleAssoc=isAdmin?state.assocMembers:state.assocMembers.filter(m=>dOf(m)===userName);
    const myArea=isAdmin?"":(state.members.find(m=>dOf(m)===userName)?.area||"");
    return{isAdmin,myBranch,myArea,visibleMembers,visibleAssoc};
  },[state.user,state.members,state.assocMembers]);
}

function useSync(){
  const{dispatch}=useApp();
  return useCallback(async(silent=false)=>{
    dispatch({type:silent?"SYNCING":"LOAD",p:true});
    try{
      if(IS_DEMO){dispatch({type:"SYNC",p:{members:DEMO_MEMBERS,statuses:{},assocMembers:DEMO_ASSOC,assocStatuses:{},agendas:DEMO_AGENDAS,users:DEMO_USERS}});}
      else{dispatch({type:"SYNC",p:await api.getAll()});}
    }catch{dispatch({type:"LOAD",p:false});}
  },[dispatch]);
}

function useToast(){
  const{dispatch}=useApp();
  return useCallback((msg,type="ok",ms=2500)=>{
    dispatch({type:"TOAST",p:{msg,type}});
    setTimeout(()=>dispatch({type:"TOAST",p:null}),ms);
  },[dispatch]);
}

/* ── SHARED UI ── */
function Toast({t}){
  if(!t)return null;
  const bg={ok:T.ok,warn:T.warn,error:T.ng,info:T.nl}[t.type]||T.ok;
  return<div className="fixed top-4 left-1/2 z-50 px-5 py-3 rounded-2xl text-white font-bold shadow-2xl text-sm pointer-events-none"style={{backgroundColor:bg,transform:"translateX(-50%)",maxWidth:320,textAlign:"center"}}>{t.msg}</div>;
}
function StatusChip({status,size="sm"}){
  const cfg=SCFG[status]||SCFG[S.NONE];
  const cls=size==="xl"?"px-4 py-1.5 text-base font-black rounded-xl min-w-16 text-center":size==="lg"?"px-4 py-1.5 text-sm font-bold rounded-full":"px-3 py-1 text-sm font-bold rounded-lg";
  return<span className={cls}style={{backgroundColor:cfg.bg,color:cfg.fg}}>{status||S.NONE}</span>;
}
function Hdr({title,onBack,right}){
  return(
    <div className="flex items-center gap-3 mb-5">
      {onBack&&<button onClick={onBack}className="text-2xl p-1 font-black"style={{color:T.gold}}>←</button>}
      <h2 className="text-xl font-black text-white flex-1">{title}</h2>
      {right}
    </div>
  );
}

/* ── STATUS MODAL（代理人氏名入力付き） ── */
function StatusModal({member,current,onClose,onSelect,assoc=false}){
  const[sel,setSel]=useState(current===S.NONE?null:current);
  const[proxyName,setProxyName]=useState("");
  const OPTS=assoc?[
    {s:S.PRESENT,sub:"当日来場された方",  icon:"✓"},
    {s:S.ABSENT, sub:"欠席が確定した方",   icon:"×"},
    {s:S.NONE,   sub:"ステータスをリセット",icon:"—"},
  ]:[
    {s:S.PRESENT,sub:"当日来場された方",      icon:"✓"},
    {s:S.PROXY,  sub:"代理人が来場された場合", icon:"🤝"},
    {s:S.BALLOT, sub:"書面で議決権を行使",    icon:"📝"},
    {s:S.ABSENT, sub:"欠席が確定した方",      icon:"×"},
    {s:S.NONE,   sub:"ステータスをリセット",   icon:"—"},
  ];
  const needProxy=sel===S.PROXY;
  const canConfirm=sel!==null&&sel!==current&&(!needProxy||proxyName.trim().length>0);
  const selCfg=sel?SCFG[sel]:null;
  return(
    <div className="fixed inset-0 z-40 flex items-end"onClick={onClose}style={{backgroundColor:"rgba(0,0,0,.6)"}}>
      <div className="modal-inner w-full rounded-t-3xl pt-6 pb-8 px-5"style={{backgroundColor:"#fff",maxWidth:430,margin:"0 auto"}}onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-4">
          <div>
            <p className="font-black text-2xl text-gray-800">{member.name}</p>
            <p className="text-xs text-gray-400 mt-0.5">{member.nameKana}{member.district?` · ${member.district}`:""}{assoc&&<span className="ml-1 font-bold"style={{color:T.teal}}>准組合員</span>}</p>
            <div className="mt-2 flex items-center gap-2"><span className="text-xs text-gray-400">現在：</span><StatusChip status={current}size="lg"/></div>
          </div>
          <button onClick={onClose}className="text-gray-300 text-3xl leading-none">×</button>
        </div>
        <p className="text-xs font-bold text-gray-400 mb-2">変更するステータスを選択</p>
        <div className="space-y-2 mb-4">
          {OPTS.map(({s,sub,icon})=>{
            const isSel=sel===s;
            const cfg=SCFG[s];
            return(
              <button key={s}onClick={()=>{setSel(s);if(s!==S.PROXY)setProxyName("");}}
                className="w-full flex items-center gap-4 rounded-2xl px-4 py-3.5 text-left transition-all active:scale-98"
                style={{backgroundColor:isSel?cfg.bg:"#f8fafc",border:isSel?`2px solid ${cfg.dot}`:"2px solid #f1f5f9"}}>
                <div className="w-9 h-9 rounded-xl flex items-center justify-center font-black text-base shrink-0"style={{backgroundColor:isSel?"rgba(255,255,255,.25)":cfg.bg,color:isSel?"#fff":cfg.fg}}>{icon}</div>
                <div className="flex-1">
                  <p className="font-black text-sm"style={{color:isSel?"#fff":"#1f2937"}}>{s}</p>
                  <p className="text-xs"style={{color:isSel?"rgba(255,255,255,.7)":"#9ca3af"}}>{sub}</p>
                </div>
                {isSel&&<div className="w-6 h-6 rounded-full flex items-center justify-center shrink-0"style={{backgroundColor:"rgba(255,255,255,.3)"}}><span className="text-white text-sm font-black">✓</span></div>}
              </button>
            );
          })}
        </div>
        {needProxy&&(
          <div className="mb-4">
            <p className="text-xs font-bold text-gray-500 mb-1">代理人氏名 <span style={{color:T.ng}}>*必須</span></p>
            <input value={proxyName}onChange={e=>setProxyName(e.target.value)}placeholder="代理人のフルネームを入力"
              className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400"/>
          </div>
        )}
        <button onClick={()=>{if(canConfirm)onSelect(sel,proxyName.trim());}}disabled={!canConfirm}
          className="w-full py-4 rounded-2xl font-black text-white text-lg transition-all active:scale-95 disabled:opacity-30"
          style={{backgroundColor:selCfg?.bg||T.navy}}>
          {!sel?"ステータスを選んでください":sel===current?"変更なし":needProxy&&!proxyName.trim()?"代理人氏名を入力してください":`「${sel}」で確定する`}
        </button>
      </div>
    </div>
  );
}

/* ── MEMBER LIST ── */
function MemberList({members,onSelect}){
  const{state}=useApp();
  const[q,setQ]=useState("");
  const statusOf=id=>state.statuses[id]||S.NONE;
  const list=useMemo(()=>{
    if(!q)return members;
    return members.filter(m=>m.name.includes(q)||(m.nameKana||"").includes(q)||(m.district||"").includes(q)||(m.area||"").includes(q)||m.id.includes(q));
  },[members,q]);
  return(
    <div>
      <div className="relative mb-3">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
        <input value={q}onChange={e=>setQ(e.target.value)}placeholder="氏名・カナ・支店名で検索"className="w-full pl-9 pr-9 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:outline-none"/>
        {q&&<button onClick={()=>setQ("")}className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-lg">×</button>}
      </div>
      <div className="space-y-2"style={{maxHeight:"65vh",overflowY:"auto"}}>
        {!list.length&&<p className="text-center py-10 text-sm"style={{color:"rgba(255,255,255,.4)"}}>該当なし</p>}
        {list.map(m=>{
          const st=statusOf(m.id);const cfg=SCFG[st];
          return(
            <button key={m.id}onClick={()=>onSelect(m)}className="w-full text-left bg-white rounded-2xl px-4 py-4 flex items-center gap-3 shadow-sm active:scale-98 transition-all"style={{borderLeft:`5px solid ${cfg.dot}`}}>
              <div className="flex-1 min-w-0">
                <div className="font-black text-gray-800 text-base">{m.name}</div>
                <div className="text-xs text-gray-400 mt-0.5">{m.nameKana}{m.district?` · ${m.district}`:""}{m.area?` (${m.area})`:""}</div>
              </div>
              <StatusChip status={st}size="xl"/>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── STATS BLOCK（総代） ── */
function StatsBlock({members,statuses}){
  const total=members.length;
  const present=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const proxy=members.filter(m=>statuses[m.id]===S.PROXY).length;
  const ballot=members.filter(m=>statuses[m.id]===S.BALLOT).length;
  const absent=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const none=total-present-proxy-ballot-absent;
  const eff=present+proxy+ballot;
  const quor=Math.ceil(total*QUORUM);
  const ok=eff>=quor;
  const quorPct=quor>0?Math.min(100,eff/quor*100):0;
  const pct=v=>total>0?Math.round(v/total*100):0;
  return(
    <div>
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
        <div className="flex-1 text-center border-r"style={{borderColor:"rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black text-white">{present+proxy}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>来場（{pct(present+proxy)}%）</div>
        </div>
        <div className="flex-1 text-center border-r"style={{borderColor:"rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black"style={{color:T.gold}}>{ballot}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>書面議決（{pct(ballot)}%）</div>
        </div>
        <div className="flex-1 text-center">
          <div className="text-2xl font-black text-white">{total}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>対象総代数</div>
        </div>
      </div>
      <div className="flex items-center justify-between mb-1">
        <span className="text-xs font-bold"style={{color:"rgba(255,255,255,.7)"}}>定足数まであと{Math.max(0,quor-eff)}名</span>
        <span className="text-xs font-black px-2.5 py-0.5 rounded-full text-white"style={{backgroundColor:ok?T.ok:T.warn}}>{ok?`✓ 達成（${Math.round(quorPct)}%）`:`未達成（${Math.round(quorPct)}%）`}</span>
      </div>
      <div className="h-2.5 rounded-full overflow-hidden mb-3"style={{backgroundColor:"rgba(255,255,255,.2)"}}>
        <div className="h-full rounded-full transition-all duration-700"style={{width:`${quorPct}%`,backgroundColor:ok?T.ok:T.warn}}/>
      </div>
      <div className="grid grid-cols-5 gap-1.5">
        {[{l:"出席",v:present,c:T.ok},{l:"代理",v:proxy,c:T.nl},{l:"書面",v:ballot,c:T.gold},{l:"欠席",v:absent,c:"#9ca3af"},{l:"未入力",v:none,c:T.warn}].map(({l,v,c})=>(
          <div key={l}className="text-center rounded-xl py-2 px-1"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
            <div className="text-xl font-black leading-tight"style={{color:c}}>{v}</div>
            <div className="text-xs font-bold leading-tight"style={{color:"rgba(255,255,255,.5)"}}>{pct(v)}%</div>
            <div className="text-xs opacity-60 text-white leading-tight mt-0.5">{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── ASSOC STATS BLOCK（准組合員：出席・欠席のみ） ── */
function AssocStatsBlock({members,statuses}){
  const total=members.length;
  const present=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const absent=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const none=total-present-absent;
  const pct=v=>total>0?Math.round(v/total*100):0;
  return(
    <div>
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
        <div className="flex-1 text-center border-r"style={{borderColor:"rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black text-white">{present}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>出席（{pct(present)}%）</div>
        </div>
        <div className="flex-1 text-center border-r"style={{borderColor:"rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black"style={{color:"#9ca3af"}}>{absent}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>欠席（{pct(absent)}%）</div>
        </div>
        <div className="flex-1 text-center">
          <div className="text-2xl font-black text-white">{total}<span className="text-xs font-bold ml-1">名</span></div>
          <div className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.6)"}}>対象者数</div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-1.5">
        {[{l:"出席",v:present,c:T.ok},{l:"欠席",v:absent,c:"#9ca3af"},{l:"未入力",v:none,c:T.warn}].map(({l,v,c})=>(
          <div key={l}className="text-center rounded-xl py-2 px-1"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
            <div className="text-xl font-black leading-tight"style={{color:c}}>{v}</div>
            <div className="text-xs font-bold leading-tight"style={{color:"rgba(255,255,255,.5)"}}>{pct(v)}%</div>

/* ── BRANCH CARD（支店ユーザー向けビジュアル） ── */
function BranchCard({members,statuses,branchName,areaName}){
  const total=members.length;
  const present=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const proxy=members.filter(m=>statuses[m.id]===S.PROXY).length;
  const ballot=members.filter(m=>statuses[m.id]===S.BALLOT).length;
  const absent=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const none=total-present-proxy-ballot-absent;
  const eff=present+proxy+ballot;
  const quor=Math.ceil(total*QUORUM);
  const ok=eff>=quor;
  const pct=v=>total>0?Math.round(v/total*100):0;
  const BARS=[{l:"出席",v:present,c:T.ok},{l:"代理出席",v:proxy,c:T.nl},{l:"書面議決",v:ballot,c:T.gold},{l:"欠席",v:absent,c:"#9ca3af"},{l:"未入力",v:none,c:T.warn}];
  const r=40,circ=2*Math.PI*r;
  let off=0;
  const arcs=[{v:present,c:T.ok},{v:proxy,c:T.nl},{v:ballot,c:T.gold}].map(({v,c})=>{
    const dash=total>0?(v/total)*circ:0;const el={v,c,dash,off};off+=dash;return el;
  });
  return(
    <div className="rounded-2xl p-4 mt-3"style={{backgroundColor:"rgba(0,0,0,.15)"}}>
      <div className="flex items-start justify-between mb-3">
        <div>
          <p className="font-black text-white text-base leading-tight">🏢 {branchName}</p>
          {areaName&&<p className="text-xs mt-0.5"style={{color:"rgba(255,255,255,.5)"}}>{areaName}</p>}
        </div>
        <span className="text-xs font-black px-3 py-1 rounded-full text-white shrink-0"style={{backgroundColor:ok?T.ok:T.warn}}>{ok?"✓ 達成":"未達成"}</span>
      </div>
      <div className="flex items-center gap-4 mb-3">
        <div className="relative shrink-0"style={{width:88,height:88}}>
          <svg viewBox="0 0 100 100"style={{width:88,height:88,transform:"rotate(-90deg)"}}>
            <circle cx="50"cy="50"r={r}fill="none"strokeWidth="14"stroke="rgba(255,255,255,.12)"/>
            {arcs.map(({v,c,dash,off:o},i)=>v>0&&<circle key={i}cx="50"cy="50"r={r}fill="none"strokeWidth="14"stroke={c}strokeDasharray={`${dash} ${circ}`}strokeDashoffset={-o}strokeLinecap="butt"/>)}
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:20,fontWeight:900,color:"#fff",lineHeight:1}}>{pct(eff)}%</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>行使率</span>
          </div>
        </div>
        <div className="flex-1 space-y-1">
          {BARS.map(({l,v,c})=>(
            <div key={l}>
              <div className="flex justify-between"style={{fontSize:10,marginBottom:1}}>
                <span style={{color:"rgba(255,255,255,.7)"}}>{l}</span>
                <span style={{color:"#fff",fontWeight:700}}>{v}名 <span style={{color:"rgba(255,255,255,.4)"}}>{pct(v)}%</span></span>
              </div>
              <div style={{height:4,borderRadius:9,overflow:"hidden",backgroundColor:"rgba(255,255,255,.15)"}}>
                <div style={{height:"100%",borderRadius:9,width:`${pct(v)}%`,backgroundColor:c,transition:"width .7s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="p-2.5 rounded-xl"style={{backgroundColor:"rgba(0,0,0,.2)"}}>
        <div className="flex justify-between mb-1"style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>
          <span>議決権行使 {eff}名 / 定足数 {quor}名</span>
          <span style={{color:"rgba(255,255,255,.4)"}}>あと {Math.max(0,quor-eff)}名</span>
        </div>
        <div style={{height:8,borderRadius:9,overflow:"hidden",backgroundColor:"rgba(255,255,255,.2)"}}>
          <div style={{height:"100%",borderRadius:9,backgroundColor:ok?T.ok:T.warn,width:`${Math.min(100,quor>0?eff/quor*100:0)}%`,transition:"width .7s"}}/>
        </div>
      </div>
    </div>
  );
}

/* ── QR READER ── */
function QrReader({members,onFound,onError}){
  const divRef=useRef(null);const scannerRef=useRef(null);
  useEffect(()=>{
    if(!divRef.current)return;
    let cancelled=false;
    const tryStart=(attempts=0)=>{
      if(cancelled)return;
      if(!window.Html5Qrcode){if(attempts>20){onError("QRライブラリのタイムアウト");return;}setTimeout(()=>tryStart(attempts+1),100);return;}
      const scanner=new window.Html5Qrcode(divRef.current.id);
      scannerRef.current=scanner;
      scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:240}},
        text=>{const m=members.find(x=>x.id===text);if(m)onFound(m);else onError("一致する総代が見つかりません");},
        ()=>{}
      ).catch(()=>onError("カメラを起動できませんでした"));
    };
    tryStart();
    return()=>{cancelled=true;if(scannerRef.current){scannerRef.current.stop().catch(()=>{});scannerRef.current=null;}};
  },[]);
  return<div id="qr-reader-live"ref={divRef}className="rounded-3xl overflow-hidden"style={{width:"100%",minHeight:300}}/>;
}

      {phase==="idle"&&(
        <div className="flex flex-col items-center pt-8 gap-5">
          <div className="w-52 h-52 rounded-3xl flex items-center justify-center"style={{backgroundColor:"rgba(255,255,255,.1)",fontSize:80}}>📷</div>
          {IS_DEMO?(
            <div className="w-full space-y-3">
              <p className="text-center text-sm"style={{color:"rgba(255,255,255,.6)"}}>デモ：総代を選択してシミュレート</p>
              <select value={demoId}onChange={e=>setDemoId(e.target.value)}className="w-full px-4 py-3 rounded-xl text-sm focus:outline-none">
                {visibleMembers.map(m=><option key={m.id}value={m.id}>{m.name}（{m.id}）</option>)}
              </select>
              <button onClick={()=>{const m=visibleMembers.find(x=>x.id===demoId);if(m){setFound(m);setPhase("confirm");}}}className="w-full py-4 rounded-2xl font-bold text-white active:scale-95 transition-all"style={{backgroundColor:T.gold}}>この総代を受付する</button>
            </div>
          ):(
            <button onClick={()=>setPhase("scan")}className="px-10 py-4 rounded-2xl font-bold text-white text-lg active:scale-95 transition-all"style={{backgroundColor:T.gold}}>スキャン開始</button>
          )}
        </div>
      )}
      {phase==="scan"&&(
        <div>
          <QrReader members={visibleMembers}onFound={handleFound}onError={handleError}/>
          <button onClick={()=>setPhase("idle")}className="mt-4 w-full py-3 rounded-2xl font-bold text-sm text-white"style={{backgroundColor:"rgba(255,255,255,.15)"}}>キャンセル</button>
        </div>
      )}
      {phase==="confirm"&&found&&<StatusModal member={found}current={state.statuses[found.id]||S.NONE}onClose={()=>{setPhase("idle");setFound(null);}}onSelect={handleStatusSelect}/>}
      {phase==="done"&&(
        <div className="flex flex-col items-center pt-16 gap-4">
          <div style={{fontSize:96}}>✅</div>
          <p className="text-white font-black text-2xl">登録完了！</p>
          <StatusChip status={state.statuses[found?.id]}size="lg"/>
        </div>
      )}
    </div>
  );
}

/* ── MANUAL SCREEN ── */
function ManualScreen(){
  const{state,dispatch}=useApp();
  const{visibleMembers}=useRole();
  const toast=useToast();
  const[sel,setSel]=useState(null);
  const handleStatusSelect=async(status,proxyName)=>{
    if(!status||status===S.NONE){toast("ステータスを選択してください","warn");return;}
    dispatch({type:"STATUS",p:{memberId:sel.id,status}});
    if(!IS_DEMO)try{await api.updateStatus({memberId:sel.id,memberName:sel.name,status,proxyName:proxyName||"",operator:state.user?.name,ts:new Date().toISOString()});}catch{}
    toast(`✅ ${sel.name}様 → ${status}`);setSel(null);
  };
  return(
    <div className="min-h-screen px-5 pt-6"style={{background:`linear-gradient(150deg,${T.nd},${T.nl})`}}>
      <Hdr title="✋ 手動入力"onBack={()=>dispatch({type:"SCREEN",p:"dash"})}/>
      <MemberList members={visibleMembers}onSelect={setSel}/>
      {sel&&<StatusModal member={sel}current={state.statuses[sel.id]||S.NONE}onClose={()=>setSel(null)}onSelect={handleStatusSelect}/>}
    </div>
  );
}

/* ── LIST SCREEN ── */
function ListScreen(){
  const{state,dispatch}=useApp();
  const{isAdmin,visibleMembers,visibleAssoc}=useRole();
  const toast=useToast();
  const[tab,setTab]=useState("members");
  const[filter,setFilter]=useState("all");
  const[sel,setSel]=useState(null);
  const[q,setQ]=useState("");
  const isAssocTab=tab==="assoc";
  const baseMembers=isAssocTab?visibleAssoc:visibleMembers;
  const baseStatuses=isAssocTab?state.assocStatuses:state.statuses;
  const statusOf=id=>baseStatuses[id]||S.NONE;
  const stats=useMemo(()=>{
    const total=baseMembers.length;
    const present=baseMembers.filter(m=>baseStatuses[m.id]===S.PRESENT).length;
    const proxy=isAssocTab?0:baseMembers.filter(m=>baseStatuses[m.id]===S.PROXY).length;
    const ballot=isAssocTab?0:baseMembers.filter(m=>baseStatuses[m.id]===S.BALLOT).length;
    const absent=baseMembers.filter(m=>baseStatuses[m.id]===S.ABSENT).length;
    const none=total-present-proxy-ballot-absent;
    return{total,present,proxy,ballot,absent,none};
  },[baseMembers,baseStatuses,isAssocTab]);
  const list=useMemo(()=>{
    let arr=baseMembers;
    if(q)arr=arr.filter(m=>m.name.includes(q)||(m.nameKana||"").includes(q)||(m.district||m.branch||"").includes(q));
    if(filter!=="all"){
      const sMap={none:S.NONE,present:S.PRESENT,proxy:S.PROXY,ballot:S.BALLOT,absent:S.ABSENT};
      arr=arr.filter(m=>statusOf(m.id)===sMap[filter]);
    }
    return arr;
  },[baseMembers,baseStatuses,q,filter]);
  const handleStatusSelect=async(status,proxyName)=>{
    if(!status||status===S.NONE){toast("ステータスを選択してください","warn");return;}
    if(isAssocTab){
      dispatch({type:"ASSOC_STATUS",p:{memberId:sel.id,status}});
      if(!IS_DEMO)try{await api.updateAssocStatus({memberId:sel.id,memberName:sel.name,status,operator:state.user?.name,ts:new Date().toISOString()});}catch{}
    }else{
      dispatch({type:"STATUS",p:{memberId:sel.id,status}});
      if(!IS_DEMO)try{await api.updateStatus({memberId:sel.id,memberName:sel.name,status,proxyName:proxyName||"",operator:state.user?.name,ts:new Date().toISOString()});}catch{}
    }
    toast(`${sel.name}様 → ${status}`);setSel(null);
  };
  const TABS=[
    {k:"all",    label:"全員",  count:stats.total},
    {k:"none",   label:"未入力",count:stats.none},
    {k:"present",label:"出席", count:stats.present},
    ...(!isAssocTab?[{k:"proxy",label:"代理",count:stats.proxy},{k:"ballot",label:"書面",count:stats.ballot}]:[]),
    {k:"absent", label:"欠席", count:stats.absent},
  ];
  return(
    <div className="min-h-screen"style={{backgroundColor:T.bg}}>
      <div className="px-5 sm:px-8 pt-6 pb-4"style={{background:`linear-gradient(150deg,${T.nd},${T.nl})`}}>
        <Hdr title="📋 総代一覧"onBack={()=>dispatch({type:"SCREEN",p:"dash"})}/>
        <div className="flex gap-2 mb-3">
          {[{k:"members",l:"総代"},{k:"assoc",l:"准組合員総代"}].map(({k,l})=>(
            <button key={k}onClick={()=>{setTab(k);setFilter("all");setQ("");}}className="flex-1 py-2 rounded-xl font-bold text-sm transition-all"style={{backgroundColor:tab===k?"#fff":"rgba(255,255,255,.15)",color:tab===k?T.navy:"rgba(255,255,255,.8)"}}>
              {l}
            </button>
          ))}
        </div>
        <div className="relative">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
          <input value={q}onChange={e=>setQ(e.target.value)}placeholder="氏名・カナ・支店名で検索"className="w-full pl-9 pr-4 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:outline-none"/>
          {q&&<button onClick={()=>setQ("")}className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-lg">×</button>}
        </div>
      </div>
      <div className="px-4 sm:px-8 py-3 flex gap-2 overflow-x-auto"style={{scrollbarWidth:"none"}}>
        {TABS.map(({k,label,count})=>(
          <button key={k}onClick={()=>setFilter(k)}className="whitespace-nowrap text-xs sm:text-sm font-bold px-3 sm:px-4 py-1.5 rounded-full transition-all shrink-0"style={{backgroundColor:filter===k?T.navy:"#fff",color:filter===k?"#fff":"#6b7280",border:filter===k?"none":"1px solid #e5e7eb"}}>
            {label} <span style={{opacity:.7}}>{count}</span>
          </button>
        ))}
      </div>
      <div className="px-4 sm:px-8 pb-10">
        {!list.length&&<p className="text-center py-16 text-gray-400 text-sm">該当なし</p>}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {list.map(m=>{
            const st=statusOf(m.id);const cfg=SCFG[st];
            return(
              <button key={m.id}onClick={()=>setSel(m)}className="w-full flex items-center gap-3 bg-white rounded-2xl px-4 py-4 shadow-sm active:bg-gray-50 transition-all text-left"style={{borderLeft:`5px solid ${cfg.dot}`}}>
                <div className="flex-1 min-w-0">
                  <div className="font-black text-gray-800 text-base">{m.name}</div>
                  <div className="text-xs text-gray-400 mt-0.5">
                    {m.nameKana}
                    {(m.district||m.branch)?` · ${m.district||m.branch}`:""}
                    {isAssocTab&&<span className="ml-1 font-bold"style={{color:T.teal}}>准</span>}
                  </div>
                </div>
                <StatusChip status={st}size="xl"/>
              </button>
            );
          })}
        </div>
      </div>
      {sel&&<StatusModal member={sel}current={statusOf(sel.id)}assoc={isAssocTab}onClose={()=>setSel(null)}onSelect={handleStatusSelect}/>}
    </div>
  );
}

/* ── APP ROOT ── */
const SCREENS={login:LoginScreen,loading:LoadingScreen,csv:CsvScreen,dash:DashScreen,qr:QRScreen,man:ManualScreen,lst:ListScreen};
function App(){
  const[state,dispatch]=useReducer(reducer,INIT);
  const Screen=SCREENS[state.screen]||LoginScreen;
  return(
    <Ctx.Provider value={{state,dispatch}}>
      <Toast t={state.toast}/>
      <Screen/>
    </Ctx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
