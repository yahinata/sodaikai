<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>総代会 出席管理システム</title>
  <meta name="theme-color" content="#1B365D"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#EDF2F7;font-family:'Noto Sans JP',sans-serif}
    #root{width:100%;max-width:768px;margin:0 auto;min-height:100vh}
    input,select,button{font-family:inherit}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
    .sy{overflow-y:auto;-webkit-overflow-scrolling:touch}
    .mo{position:fixed;top:0;left:0;right:0;bottom:0;z-index:40;display:flex;flex-direction:column;justify-content:flex-end;overflow-y:auto;-webkit-overflow-scrolling:touch;background:rgba(0,0,0,.6)}
    .ms{width:100%;max-width:430px;margin:0 auto;background:#fff;border-radius:1.5rem 1.5rem 0 0;padding:1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom,0px));max-height:85vh;max-height:85dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
    @media(min-width:640px){.ms{max-width:560px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useReducer,useEffect,useCallback,useMemo,useRef,createContext,useContext}=React;

/* ── CONFIG ── */
const GAS_URL="https://script.google.com/macros/s/AKfycbzANpXVUDpMN5CAuAa7Hihxk_uP4-VkbElKz91Ok3PJgFFnQlI9ViLGo0y9m6m-jMZNOg/exec";
const IS_DEMO=GAS_URL==="YOUR_GAS_URL_HERE";
const POLL_MS=10000;
const QUORUM=0.5;
const S={NONE:"未入力",PRESENT:"出席",PROXY:"代理出席",BALLOT:"書面議決",ABSENT:"欠席"};
const T={navy:"#1B365D",nd:"#0d1f36",nl:"#2a518f",gold:"#C5A55A",bg:"#EDF2F7",ok:"#16a34a",ng:"#dc2626",warn:"#d97706",teal:"#0d9488"};
const SCFG={
  [S.NONE]:{bg:"#e5e7eb",fg:"#9ca3af",dot:"#d1d5db"},
  [S.PRESENT]:{bg:T.ok,fg:"#fff",dot:T.ok},
  [S.PROXY]:{bg:T.nl,fg:"#fff",dot:T.nl},
  [S.BALLOT]:{bg:T.gold,fg:"#fff",dot:T.gold},
  [S.ABSENT]:{bg:"#9ca3af",fg:"#fff",dot:"#9ca3af"},
};
const BG=`linear-gradient(150deg,${T.nd},${T.nl})`;

/* ── DEMO ── */
const _BR=[{d:"彦根支店",a:"彦根センター管内"},{d:"長浜支店",a:"彦根センター管内"},{d:"草津支店",a:"草津センター管内"},{d:"大津支店",a:"草津センター管内"},{d:"甲賀支店",a:"甲賀センター管内"}];
const _N=[["鈴木一郎","スズキ イチロウ"],["田中義雄","タナカ ヨシオ"],["渡辺幸子","ワタナベ サチコ"],["山本健一","ヤマモト ケンイチ"],["伊藤美智子","イトウ ミチコ"],["中村正夫","ナカムラ マサオ"],["小林和子","コバヤシ カズコ"],["加藤達也","カトウ タツヤ"],["吉田悦子","ヨシダ エツコ"],["松本浩司","マツモト コウジ"]];
const DEMO_M=Array.from({length:30},(_,i)=>({id:`M${String(i+1).padStart(3,"0")}`,name:_N[i%10][0],nameKana:_N[i%10][1],district:_BR[i%5].d,area:_BR[i%5].a}));
const _AN=[["佐々木花子","ササキ ハナコ"],["高橋一郎","タカハシ イチロウ"],["山田幸子","ヤマダ サチコ"],["小川健二","オガワ ケンジ"],["木村美穂","キムラ ミホ"]];
const DEMO_A=Array.from({length:10},(_,i)=>({id:`A${String(i+1).padStart(3,"0")}`,name:_AN[i%5][0],nameKana:_AN[i%5][1],district:_BR[i%3].d,area:_BR[i%3].a}));
const DEMO_U=[{id:"u1",name:"彦根支店",icon:"🌸"},{id:"u2",name:"長浜支店",icon:"🏔️"},{id:"u3",name:"事務局",icon:"🎋"}];
const DEMO_AG=[{id:"A1",title:"第1号議案",type:"普通"},{id:"A2",title:"第2号議案",type:"普通"},{id:"A3",title:"第3号議案",type:"特別"}];
const DEMO_ALL={members:DEMO_M,statuses:{},assocMembers:DEMO_A,assocStatuses:{},agendas:DEMO_AG,users:DEMO_U};

/* ── UTILS ── */
function isKana(s){return !s||!s.trim()||/^[\u30A0-\u30FF\u3040-\u309F\u30FC\u30FB\u3000\s]+$/.test(s.trim())}
function KanaText({value}){
  if(!value)return null;
  if(!isKana(value))return <span><span style={{color:T.warn}}>⚠</span><span style={{color:T.ng,fontWeight:700}}>{value}</span></span>;
  return <span>{value}</span>;
}
function parseCsv(text){
  const lines=text.trim().split(/\r?\n/).filter(Boolean);
  if(!lines.length)return[];
  const clean=l=>l.replace(/^\uFEFF/,"");
  const first=clean(lines[0]).split(",")[0].trim().replace(/^"|"$/g,"");
  const data=(isNaN(first)&&!/^[MA]\d+/i.test(first))?lines.slice(1):lines;
  return data.map((line,idx)=>{
    const c=clean(line).split(",").map(x=>x.trim().replace(/^"|"$/g,""));
    return{id:c[0]||`M${String(idx+1).padStart(3,"0")}`,name:c[1]||"",nameKana:c[2]||"",district:c[3]||"",area:c[4]||"",tel:c[5]||""};
  }).filter(m=>m.name);
}
function dlCsv(fn,hds,rows){
  const esc=v=>{const s=String(v??"");return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;};
  const blob=new Blob(["\uFEFF"+[hds,...rows].map(r=>r.map(esc).join(",")).join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fn;a.click();
}

/* ── API ── */
const api={
  async req(action,method="GET",body=null){
    const opts={method,redirect:"follow"};
    if(body){opts.headers={"Content-Type":"text/plain;charset=utf-8"};opts.body=JSON.stringify(body);}
    const res=await fetch(`${GAS_URL}?action=${action}`,opts);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const t=await res.text();try{return JSON.parse(t);}catch{throw new Error("JSON error:"+t.slice(0,80));}
  },
  getAll:()=>api.req("getAll"),
  updateStatus:d=>api.req("updateStatus","POST",d),
  updateAssocStatus:d=>api.req("updateAssocStatus","POST",d),
  importMembers:a=>api.req("importMembers","POST",{members:a}),
  importAssocMembers:a=>api.req("importAssocMembers","POST",{members:a}),
};

/* ── STATE ── */
const INIT={user:null,screen:"login",members:[],statuses:{},assocMembers:[],assocStatuses:{},agendas:[],users:[],loading:false,syncing:false,toast:null,statusLog:[]};
function reducer(s,{type:t,p}){
  switch(t){
    case"USER":return{...s,user:p,screen:p?"loading":"login",statusLog:[]};
    case"SCREEN":return{...s,screen:p};
    case"MEMBERS":return{...s,members:p,screen:"dash"};
    case"ASSOC_MEMBERS":return{...s,assocMembers:p};
    case"SYNC":{
      const sc=s.screen==="loading"?(p.members?.length>0?"dash":"csv"):s.screen;
      const serverLog=(p.recentLog||[]).map(r=>({memberId:r.memberId,name:r.memberName||"",status:r.status,ts:r.ts||"",isAssoc:!!r.isAssoc,operator:r.operator||""}));
      const merged=serverLog.length>0?serverLog:s.statusLog;
      return{...s,...p,syncing:false,loading:false,screen:sc,statusLog:merged};
    }
    case"LOAD":return{...s,loading:p};
    case"SYNCING":return{...s,syncing:p};
    case"TOAST":return{...s,toast:p};
    case"STATUS":{
      const n={...s.statuses};if(p.status===S.NONE)delete n[p.memberId];else n[p.memberId]=p.status;
      const entry={memberId:p.memberId,name:p.name||"",status:p.status,ts:new Date().toISOString(),isAssoc:false,operator:p.operator||""};
      return{...s,statuses:n,statusLog:[entry,...s.statusLog].slice(0,30)};
    }
    case"ASSOC_STATUS":{
      const n={...s.assocStatuses};if(p.status===S.NONE)delete n[p.memberId];else n[p.memberId]=p.status;
      const entry={memberId:p.memberId,name:p.name||"",status:p.status,ts:new Date().toISOString(),isAssoc:true,operator:p.operator||""};
      return{...s,assocStatuses:n,statusLog:[entry,...s.statusLog].slice(0,30)};
    }
    default:return s;
  }
}

/* ── CONTEXT & HOOKS ── */
const Ctx=createContext();
const useApp=()=>useContext(Ctx);
function useRole(){
  const{state}=useApp();
  return useMemo(()=>{
    const un=state.user?.name||"";
    const dOf=m=>m.district||m.branch||"";
    const allD=[...new Set(state.members.map(dOf).filter(Boolean))];
    const isAdmin=!un||!allD.includes(un);
    const myBranch=isAdmin?"":un;
    const vm=isAdmin?state.members:state.members.filter(m=>dOf(m)===un);
    const va=isAdmin?state.assocMembers:state.assocMembers.filter(m=>dOf(m)===un);
    const myArea=isAdmin?"":(state.members.find(m=>dOf(m)===un)?.area||"");
    return{isAdmin,myBranch,myArea,visibleMembers:vm,visibleAssoc:va};
  },[state.user,state.members,state.assocMembers]);
}
function useSync(){
  const{dispatch}=useApp();
  return useCallback(async(silent=false)=>{
    dispatch({type:silent?"SYNCING":"LOAD",p:true});
    try{dispatch({type:"SYNC",p:IS_DEMO?DEMO_ALL:await api.getAll()});}
    catch{dispatch({type:"LOAD",p:false});}
  },[dispatch]);
}
function useToast(){
  const{dispatch}=useApp();
  return useCallback((msg,type="ok",ms=2500)=>{
    dispatch({type:"TOAST",p:{msg,type}});setTimeout(()=>dispatch({type:"TOAST",p:null}),ms);
  },[dispatch]);
}

/* ── SHARED UI ── */
function Toast({t}){
  if(!t)return null;
  const bg={ok:T.ok,warn:T.warn,error:T.ng,info:T.nl}[t.type]||T.ok;
  return(<div className="fixed top-4 left-1/2 z-50 px-5 py-3 rounded-2xl text-white font-bold shadow-2xl text-sm pointer-events-none"style={{backgroundColor:bg,transform:"translateX(-50%)",maxWidth:320,textAlign:"center"}}>{t.msg}</div>);
}
function SC({status,size="sm"}){
  const c=SCFG[status]||SCFG[S.NONE];
  const cls=size==="xl"?"px-4 py-1.5 text-base font-black rounded-xl min-w-16 text-center":size==="lg"?"px-4 py-1.5 text-sm font-bold rounded-full":"px-3 py-1 text-sm font-bold rounded-lg";
  return(<span className={cls}style={{backgroundColor:c.bg,color:c.fg}}>{status||S.NONE}</span>);
}
function Hdr({title,onBack}){
  return(
    <div className="flex items-center gap-3 mb-5">
      {onBack&&<button onClick={onBack}className="text-2xl p-1 font-black"style={{color:T.gold}}>←</button>}
      <h2 className="text-xl font-black text-white flex-1">{title}</h2>
    </div>
  );
}

/* ── STATUS MODAL ── */
function StatusModal({member,current,onClose,onSelect,assoc=false}){
  const[sel,setSel]=useState(current===S.NONE?null:current);
  const[proxy,setProxy]=useState("");
  const OPTS=assoc?[
    {s:S.PRESENT,sub:"当日来場",icon:"✓"},
    {s:S.ABSENT,sub:"欠席確定",icon:"×"},
    {s:S.NONE,sub:"リセット",icon:"—"},
  ]:[
    {s:S.PRESENT,sub:"当日来場",icon:"✓"},
    {s:S.PROXY,sub:"代理人来場",icon:"🤝"},
    {s:S.BALLOT,sub:"書面議決",icon:"📝"},
    {s:S.ABSENT,sub:"欠席確定",icon:"×"},
    {s:S.NONE,sub:"リセット",icon:"—"},
  ];
  const np=sel===S.PROXY;
  const canOk=sel!==null&&sel!==current&&(!np||proxy.trim().length>0);
  const sc=sel?SCFG[sel]:null;
  return(
    <div className="mo"onClick={onClose}>
      <div className="ms"onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-4">
          <div>
            <p className="font-black text-2xl text-gray-800">{member.name}</p>
            <p className="text-xs text-gray-400 mt-0.5"><KanaText value={member.nameKana}/>{member.district?` · ${member.district}`:""}{assoc&&<span className="ml-1 font-bold"style={{color:T.teal}}>准</span>}</p>
            <div className="mt-2 flex items-center gap-2"><span className="text-xs text-gray-400">現在：</span><SC status={current}size="lg"/></div>
          </div>
          <button onClick={onClose}className="text-gray-300 text-3xl leading-none">×</button>
        </div>
        <p className="text-xs font-bold text-gray-400 mb-2">ステータスを選択</p>
        <div className="space-y-2 mb-4">
          {OPTS.map(({s,sub,icon})=>{
            const is=sel===s;const cfg=SCFG[s];
            return(
              <button key={s}onClick={()=>{setSel(s);if(s!==S.PROXY)setProxy("");}}className="w-full flex items-center gap-4 rounded-2xl px-4 py-3.5 text-left transition-all active:scale-98"style={{backgroundColor:is?cfg.bg:"#f8fafc",border:is?`2px solid ${cfg.dot}`:"2px solid #f1f5f9"}}>
                <div className="w-9 h-9 rounded-xl flex items-center justify-center font-black text-base shrink-0"style={{backgroundColor:is?"rgba(255,255,255,.25)":cfg.bg,color:is?"#fff":cfg.fg}}>{icon}</div>
                <div className="flex-1">
                  <p className="font-black text-sm"style={{color:is?"#fff":"#1f2937"}}>{s}</p>
                  <p className="text-xs"style={{color:is?"rgba(255,255,255,.7)":"#9ca3af"}}>{sub}</p>
                </div>
                {is&&<div className="w-6 h-6 rounded-full flex items-center justify-center shrink-0"style={{backgroundColor:"rgba(255,255,255,.3)"}}><span className="text-white text-sm font-black">✓</span></div>}
              </button>
            );
          })}
        </div>
        {np&&(
          <div className="mb-4">
            <p className="text-xs font-bold text-gray-500 mb-1">代理人氏名 <span style={{color:T.ng}}>*必須</span></p>
            <input value={proxy}onChange={e=>setProxy(e.target.value)}placeholder="代理人のフルネーム"className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none"/>
          </div>
        )}
        <button onClick={()=>{if(canOk)onSelect(sel,proxy.trim());}}disabled={!canOk}className="w-full py-4 rounded-2xl font-black text-white text-lg transition-all active:scale-95 disabled:opacity-30"style={{backgroundColor:sc?.bg||T.navy}}>
          {!sel?"ステータスを選んでください":sel===current?"変更なし":np&&!proxy.trim()?"代理人氏名を入力してください":`「${sel}」で確定する`}
        </button>
      </div>
    </div>
  );
}

/* ── MEMBER LIST ── */
function MemberList({members,statuses,onSelect}){
  const[q,setQ]=useState("");
  const statusOf=id=>(statuses||{})[id]||S.NONE;
  const list=useMemo(()=>{
    if(!q)return members;
    return members.filter(m=>m.name.includes(q)||(m.nameKana||"").includes(q)||(m.district||"").includes(q)||m.id.includes(q));
  },[members,q]);
  return(
    <div>
      <div className="relative mb-3">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
        <input value={q}onChange={e=>setQ(e.target.value)}placeholder="氏名・カナ・支店名で検索"className="w-full pl-9 pr-9 py-3 rounded-xl bg-white border border-gray-200 text-sm focus:outline-none"/>
        {q&&<button onClick={()=>setQ("")}className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-lg">×</button>}
      </div>
      <div className="space-y-2 sy"style={{maxHeight:"65vh"}}>
        {!list.length&&<p className="text-center py-10 text-sm"style={{color:"rgba(255,255,255,.4)"}}>該当なし</p>}
        {list.map(m=>{
          const st=statusOf(m.id);const cfg=SCFG[st];
          return(
            <button key={m.id}onClick={()=>onSelect(m)}className="w-full text-left bg-white rounded-2xl px-4 py-4 flex items-center gap-3 shadow-sm active:scale-98 transition-all"style={{borderLeft:`5px solid ${cfg.dot}`}}>
              <div className="flex-1 min-w-0">
                <div className="font-black text-gray-800 text-base">{m.name}</div>
                <div className="text-xs text-gray-400 mt-0.5"><KanaText value={m.nameKana}/>{m.district?` · ${m.district}`:""}</div>
              </div>
              <SC status={st}size="xl"/>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── STATS BLOCK ── */
function StatsBlock({members,statuses}){
  const tt=members.length;
  const pr=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const px=members.filter(m=>statuses[m.id]===S.PROXY).length;
  const bl=members.filter(m=>statuses[m.id]===S.BALLOT).length;
  const ab=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const nn=tt-pr-px-bl-ab;
  const ef=pr+px+bl;
  const qr=Math.ceil(tt*QUORUM);
  const ok=ef>=qr;
  const qp=qr>0?Math.min(100,ef/qr*100):0;
  const pc=v=>tt>0?Math.round(v/tt*100):0;
  return(
    <div>
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
        <div className="flex-1 text-center"style={{borderRight:"1px solid rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black text-white">{pr+px}<span className="text-xs ml-1">名</span></div>
          <div className="text-xs"style={{color:"rgba(255,255,255,.6)"}}>来場（{pc(pr+px)}%）</div>
        </div>
        <div className="flex-1 text-center"style={{borderRight:"1px solid rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black"style={{color:T.gold}}>{bl}<span className="text-xs ml-1">名</span></div>
          <div className="text-xs"style={{color:"rgba(255,255,255,.6)"}}>書面議決（{pc(bl)}%）</div>
        </div>
        <div className="flex-1 text-center">
          <div className="text-2xl font-black text-white">{tt}<span className="text-xs ml-1">名</span></div>
          <div className="text-xs"style={{color:"rgba(255,255,255,.6)"}}>対象総代数</div>
        </div>
      </div>
      <div className="flex items-center justify-between mb-1">
        <span className="text-xs font-bold"style={{color:"rgba(255,255,255,.7)"}}>定足数まであと{Math.max(0,qr-ef)}名</span>
        <span className="text-xs font-black px-2.5 py-0.5 rounded-full text-white"style={{backgroundColor:ok?T.ok:T.warn}}>{ok?`✓達成（${Math.round(qp)}%）`:`未達成（${Math.round(qp)}%）`}</span>
      </div>
      <div style={{height:10,borderRadius:9,overflow:"hidden",backgroundColor:"rgba(255,255,255,.2)",marginBottom:12}}>
        <div style={{height:"100%",borderRadius:9,width:`${qp}%`,backgroundColor:ok?T.ok:T.warn,transition:"width .7s"}}/>
      </div>
      <div className="grid grid-cols-5 gap-1.5">
        {[{l:"出席",v:pr,c:T.ok},{l:"代理",v:px,c:T.nl},{l:"書面",v:bl,c:T.gold},{l:"欠席",v:ab,c:"#9ca3af"},{l:"未入力",v:nn,c:T.warn}].map(({l,v,c})=>(
          <div key={l}className="text-center rounded-xl py-2 px-1"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
            <div className="text-xl font-black leading-tight"style={{color:c}}>{v}</div>
            <div className="text-xs font-bold"style={{color:"rgba(255,255,255,.5)"}}>{pc(v)}%</div>
            <div className="text-xs opacity-60 text-white mt-0.5">{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AssocStatsBlock({members,statuses}){
  const tt=members.length;
  const pr=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const ab=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const nn=tt-pr-ab;
  const pc=v=>tt>0?Math.round(v/tt*100):0;
  return(
    <div>
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl"style={{backgroundColor:"rgba(255,255,255,.12)"}}>
        <div className="flex-1 text-center"style={{borderRight:"1px solid rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black text-white">{pr}<span className="text-xs ml-1">名</span></div>
          <div className="text-xs"style={{color:"rgba(255,255,255,.6)"}}>出席（{pc(pr)}%）</div>
        </div>
        <div className="flex-1 text-center"style={{borderRight:"1px solid rgba(255,255,255,.15)"}}>
          <div className="text-2xl font-black"style={{color:"#9ca3af"}}>{ab}<span className="text-xs ml-1">名</span></div>

function BranchCard({members,statuses,branchName,areaName}){
  const tt=members.length;const pr=members.filter(m=>statuses[m.id]===S.PRESENT).length;
  const px=members.filter(m=>statuses[m.id]===S.PROXY).length;
  const bl=members.filter(m=>statuses[m.id]===S.BALLOT).length;
  const ab=members.filter(m=>statuses[m.id]===S.ABSENT).length;
  const nn=tt-pr-px-bl-ab;const ef=pr+px+bl;
  const qr=Math.ceil(tt*QUORUM);const ok=ef>=qr;
  const pc=v=>tt>0?Math.round(v/tt*100):0;
  const BARS=[{l:"出席",v:pr,c:T.ok},{l:"代理",v:px,c:T.nl},{l:"書面",v:bl,c:T.gold},{l:"欠席",v:ab,c:"#9ca3af"},{l:"未入力",v:nn,c:T.warn}];
  const r=40,circ=2*Math.PI*r;
  let off=0;
  const arcs=[{v:pr,c:T.ok},{v:px,c:T.nl},{v:bl,c:T.gold}].map(({v,c})=>{
    const d=tt>0?(v/tt)*circ:0;const el={v,c,d,off};off+=d;return el;
  });
  return(
    <div className="rounded-xl p-4 mt-2"style={{backgroundColor:"rgba(0,0,0,.15)"}}>
      <div className="flex items-start justify-between mb-3">
        <div>
          <p className="font-black text-white text-base">{branchName}</p>
          {areaName&&<p className="text-xs"style={{color:"rgba(255,255,255,.5)"}}>{areaName}</p>}
        </div>
        <span className="text-xs font-black px-3 py-1 rounded-full text-white"style={{backgroundColor:ok?T.ok:T.warn}}>{ok?"✓達成":"未達成"}</span>
      </div>
      <div className="flex items-center gap-4 mb-3">
        <div className="relative shrink-0"style={{width:88,height:88}}>
          <svg viewBox="0 0 100 100"style={{width:88,height:88,transform:"rotate(-90deg)"}}>
            <circle cx="50"cy="50"r={r}fill="none"strokeWidth="14"stroke="rgba(255,255,255,.12)"/>
            {arcs.map(({v,c,d,off:o},i)=>v>0&&<circle key={i}cx="50"cy="50"r={r}fill="none"strokeWidth="14"stroke={c}strokeDasharray={`${d} ${circ}`}strokeDashoffset={-o}/>)}
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:20,fontWeight:900,color:"#fff"}}>{pc(ef)}%</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>行使率</span>
          </div>
        </div>
        <div className="flex-1 space-y-1">
          {BARS.map(({l,v,c})=>(
            <div key={l}>
              <div className="flex justify-between"style={{fontSize:10,marginBottom:1}}>
                <span style={{color:"rgba(255,255,255,.7)"}}>{l}</span>
                <span style={{color:"#fff",fontWeight:700}}>{v}名 <span style={{color:"rgba(255,255,255,.4)"}}>{pc(v)}%</span></span>
              </div>
              <div style={{height:4,borderRadius:9,overflow:"hidden",backgroundColor:"rgba(255,255,255,.15)"}}>
                <div style={{height:"100%",borderRadius:9,width:`${pc(v)}%`,backgroundColor:c,transition:"width .7s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CsvScreen(){

  const[mode,setMode]=useState("members");const fileRef=useRef();
  const handleFile=file=>{if(!file)return;const r=new FileReader();r.onload=e=>{const p=parseCsv(e.target.result);if(!p.length){toast("有効なデータがありません","error");return;}setPreview(p);};r.readAsText(file,"UTF-8");};
  const handleImport=async()=>{
    if(!preview?.length)return;const isA=mode==="assoc";

        ))}

      {!preview?(
        <div>
          <div onClick={()=>fileRef.current.click()}onDragOver={e=>{e.preventDefault();setDragging(true);}}onDragLeave={()=>setDragging(false)}onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}className="rounded-3xl border-2 border-dashed flex flex-col items-center justify-center py-14 gap-4 cursor-pointer"style={{borderColor:dragging?T.gold:"rgba(255,255,255,.3)",backgroundColor:"rgba(255,255,255,.07)"}}>

            <p className="text-white font-bold text-lg">CSVファイルを選択</p>

            <p className="text-xs font-bold mb-2"style={{color:T.gold}}>CSV形式</p>
            <p className="text-xs text-white font-mono"style={{opacity:.7}}>ID, 氏名, フリガナ, 支店名, エリア名, 電話番号</p>
          </div>

/* ── QR READER ── */
function QrReader({members,onFound,onError}){
  const ref=useRef(null);const sr=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;let cancelled=false;
    const go=(n=0)=>{
      if(cancelled)return;
      if(!window.Html5Qrcode){if(n>20){onError("QRライブラリタイムアウト");return;}setTimeout(()=>go(n+1),100);return;}
      const s=new window.Html5Qrcode(ref.current.id);sr.current=s;
      s.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:240}},
        text=>{const m=members.find(x=>x.id===text);if(m)onFound(m);else onError("一致する総代なし");},()=>{}
      ).catch(()=>onError("カメラ起動失敗"));
    };go();
    return()=>{cancelled=true;if(sr.current){sr.current.stop().catch(()=>{});sr.current=null;}};
  },[]);
  return(<div id="qr-reader-live"ref={ref}className="rounded-3xl overflow-hidden"style={{width:"100%",minHeight:300}}/>);
}

  const onFound=m=>{setFound({m,a:m._a});setPhase("confirm");};

            )}

        {phase==="scan"&&(

  );

      <div className="px-4 sm:px-8 py-3 flex gap-2 overflow-x-auto"style={{scrollbarWidth:"none"}}>
        {TABS.map(({k,l,c})=>(
          <button key={k}onClick={()=>setFilter(k)}className="whitespace-nowrap text-xs sm:text-sm font-bold px-3 py-1.5 rounded-full shrink-0"style={{backgroundColor:filter===k?T.navy:"#fff",color:filter===k?"#fff":"#6b7280",border:filter===k?"none":"1px solid #e5e7eb"}}>{l} <span style={{opacity:.7}}>{c}</span></button>
        ))}
      </div>
      <div className="px-4 sm:px-8 pb-10">
        {!list.length&&<p className="text-center py-16 text-gray-400 text-sm">該当なし</p>}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {list.map(m=>{const st=stOf(m.id);const cfg=SCFG[st];return(
            <button key={m.id}onClick={()=>setSel(m)}className="w-full flex items-center gap-3 bg-white rounded-2xl px-4 py-4 shadow-sm active:bg-gray-50 text-left"style={{borderLeft:`5px solid ${cfg.dot}`}}>
              <div className="flex-1 min-w-0">
                <div className="font-black text-gray-800 text-base">{m.name}</div>
                <div className="text-xs text-gray-400 mt-0.5"><KanaText value={m.nameKana}/>{m.district?` · ${m.district}`:""}{isA&&<span className="ml-1 font-bold"style={{color:T.teal}}>准</span>}</div>
              </div>
              <div className="flex items-center gap-2 shrink-0"><SC status={st}size="xl"/><span className="text-gray-300 text-lg">›</span></div>
            </button>
          );})}
        </div>
      </div>
      {sel&&!chg&&<DetailModal member={sel}status={stOf(sel.id)}isAssoc={isA}onClose={()=>setSel(null)}onChangeStatus={()=>setChg(sel)}/>}
      {chg&&<StatusModal member={chg}current={stOf(chg.id)}assoc={isA}onClose={()=>setChg(null)}onSelect={onStatus}/>}
    </div>
  );
}

/* ── APP ── */
const SC_MAP={login:LoginScreen,loading:LoadingScreen,csv:CsvScreen,dash:DashScreen,qr:QRScreen,man:ManualScreen,lst:ListScreen};
function App(){
  const[state,dispatch]=useReducer(reducer,INIT);const Screen=SC_MAP[state.screen]||LoginScreen;
  return(
    <Ctx.Provider value={{state,dispatch}}>
      <Toast t={state.toast}/>
      <Screen/>
    </Ctx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
